# .github/workflows/deploy.yml — Déploiement auto sur Render
name: Deploy JobCopilot

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -c "import server; print('Server OK')"
          python -c "import scanner; print('Scanner OK')"
          python -c "import ai_engine; print('AI Engine OK')"

