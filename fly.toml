# fly.toml — Configuration Fly.io
app = "jobcopilot-ise"
primary_region = "cdg"  # Paris

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false  # Garde allumé 24/24
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"  # 256MB RAM — suffisant pour Flask
  memory = "512mb"

[env]
  FLASK_ENV = "production"

[[services]]
  internal_port = 5000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
